<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bright Tup Up | Panier</title>

<style>
body {margin:0;font-family:'Poppins',sans-serif;background:#001a33;color:#e0f7ff;}
header {background:rgba(5,10,20,0.95);padding:14px 22px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #00aaff;box-shadow:0 0 15px #00aaff;position:sticky;top:0;z-index:100;}
header h1 {font-size:1.4rem;color:#00ccff;text-shadow:0 0 12px #00aaff;margin:0;font-weight:700;}
.menu-btn {font-size:26px;cursor:pointer;background:none;border:none;color:#00ccff;text-shadow:0 0 10px #00aaff;}

.container {padding:30px;}
.section-title {font-size:1.5rem;margin-bottom:20px;text-shadow:0 0 10px #00ccff;}

.cart-item {
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(0,174,239,0.35);
  border-radius:15px;
  padding:15px;
  margin-bottom:15px;
  box-shadow:0 0 10px #00aaff44;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.cart-item h3 {margin:0;color:#00ccff;}
.cart-item p {margin:5px 0;color:#ccc;}

.btn-danger {
  background:#ff4d4d;
  border:none;
  padding:6px 12px;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

.btn-danger:hover {
  background:#ff0000;
  color:white;
}

.total-box {
  margin-top:30px;
  padding:20px;
  border:1px solid #00aaff;
  border-radius:15px;
  box-shadow:0 0 12px #00aaff;
  text-align:center;
}

.btn-primary {
  background:#00ccff;
  color:#000;
  border:none;
  padding:10px 18px;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
  margin-top:10px;
}

.btn-primary:hover {
  background:#0099ff;
  color:white;
  box-shadow:0 0 12px #00aaff;
}

footer {text-align:center;padding:20px;background:rgba(0,0,0,0.6);font-size:0.9rem;border-top:1px solid #00aaff;}
</style>
</head>
<body>

<header>
  <h1>Bright Tup Up — Panier</h1>
  <button class="menu-btn" onclick="window.location.href='produits.html'">←</button>
</header>

<div class="container">

  <h2 class="section-title">🛒 Vos Produits</h2>

  <div id="cart-list"></div>

  <div class="total-box">
    <h3>Total : <span id="total-price">0</span> G</h3>
    <button class="btn-primary" onclick="checkout()">Procéder au paiement</button>
  </div>

</div>

<footer>© 2026 Bright Tup Up</footer>

<script>
let cart = JSON.parse(localStorage.getItem("dpstore_cart")) || [];
const cartList = document.getElementById("cart-list");
const totalPrice = document.getElementById("total-price");

function renderCart(){
  cartList.innerHTML = "";
  let total = 0;

  if(cart.length === 0){
    cartList.innerHTML = "<p>Votre panier est vide.</p>";
    totalPrice.textContent = "0";
    return;
  }

  cart.forEach((item, index)=>{
    total += Number(item.price);

    const div = document.createElement("div");
    div.className = "cart-item";
    div.innerHTML = `
      <div>
        <h3>${item.name}</h3>
        <p>Prix : ${item.price} G</p>
      </div>
      <button class="btn-danger" onclick="removeItem(${index})">Supprimer</button>
    `;
    cartList.appendChild(div);
  });

  totalPrice.textContent = total;
}

function removeItem(index){
  cart.splice(index,1);
  localStorage.setItem("dpstore_cart", JSON.stringify(cart));
  renderCart();
}

function checkout(){
  if(cart.length === 0){
    alert("Panier vide !");
    return;
  }
  window.location.href = "paiement.html";
}

renderCart();
</script>

</body>
</html>
