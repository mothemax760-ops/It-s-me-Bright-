<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin Panel — Bright Tup Up</title>

<style>

body{
background:radial-gradient(circle at top,#000,#001a33);
color:#e0f7ff;
font-family:Poppins,sans-serif;
margin:0;
}

header{
padding:15px;
background:#000;
border-bottom:1px solid #00aaff;
text-align:center;
}

h1{
color:#00ccff;
text-shadow:0 0 15px #00aaff;
}

.container{
padding:20px;
max-width:900px;
margin:auto;
}

.stats{
background:#000;
padding:15px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 0 15px #00aaff;
}

button{
padding:10px 16px;
border:none;
border-radius:8px;
cursor:pointer;
background:linear-gradient(90deg,#00aaff,#004466);
color:white;
margin:3px;
}

button:hover{
background:linear-gradient(90deg,#33bbff,#006699);
}

.red{
background:red;
}

input{
padding:10px;
border-radius:8px;
border:1px solid #00aaff;
background:black;
color:white;
width:100%;
margin-bottom:10px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
padding:10px;
border-bottom:1px solid #00aaff;
text-align:center;
}

</style>

</head>

<body>

<header>
<h1>Admin Dashboard 🔝🧑‍💻</h1>
</header>

<div class="container">

<div class="stats">
<p>👥 Comptes total : <span id="totalUsers">0</span></p>

<button onclick="location.href='cmd.html'">📦 Commandes</button>
<button onclick="logout()">🚪 Déconnexion</button>
</div>

<input id="search" placeholder="Rechercher un utilisateur...">

<table>

<thead>
<tr>
<th>Email</th>
<th>Crédits</th>
<th>Rôle</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="usersTable"></tbody>

</table>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getAuth,onAuthStateChanged,signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
import { getFirestore,collection,getDocs,doc,updateDoc,deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyCbQGaaTjyTxZTWNwRE5lTVkZsZbJyofgg",
authDomain:"brighttupup.firebaseapp.com",
projectId:"brighttupup",
storageBucket:"brighttupup.appspot.com",
messagingSenderId:"812394183947",
appId:"1:812394183947:web:d65d60d6aeee39bcc3b60e"
};

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);

const adminEmails=[
"christopherantoine773@gmail.com"
];

let users=[];

onAuthStateChanged(auth,(user)=>{

if(!user){
location.href="index.html";
return;
}

if(!adminEmails.includes(user.email.toLowerCase())){
alert("Accès refusé");
location.href="profil.html";
return;
}

loadUsers();

});

async function loadUsers(){

const snap=await getDocs(collection(db,"users"));

users=[];

snap.forEach(docSnap=>{

users.push({
id:docSnap.id,
...docSnap.data()
});

});

document.getElementById("totalUsers").textContent=users.length;

displayUsers(users);

}

function displayUsers(list){

const table=document.getElementById("usersTable");

table.innerHTML="";

list.forEach(user=>{

const tr=document.createElement("tr");

tr.innerHTML=`

<td>${user.email||""}</td>
<td>${user.credits||0}</td>
<td>${user.role||"user"}</td>

<td>

<button onclick="addMoney('${user.id}',${user.credits||0})">+💰</button>

<button onclick="removeMoney('${user.id}',${user.credits||0})">-💸</button>

<button onclick="makeAdmin('${user.id}')">👑</button>

<button class="red" onclick="deleteUser('${user.id}')">🗑</button>

</td>

`;

table.appendChild(tr);

});

}

window.addMoney=async function(id,credits){

let amount=prompt("Montant à ajouter");

if(!amount)return;

amount=Number(amount);

await updateDoc(doc(db,"users",id),{
credits:(Number(credits)||0)+amount
});

loadUsers();

}

window.removeMoney=async function(id,credits){

let amount=prompt("Montant à retirer");

if(!amount)return;

amount=Number(amount);

await updateDoc(doc(db,"users",id),{
credits:Math.max(0,(Number(credits)||0)-amount)
});

loadUsers();

}

window.makeAdmin=async function(id){

await updateDoc(doc(db,"users",id),{
role:"admin"
});

loadUsers();

}

window.deleteUser=async function(id){

if(!confirm("Supprimer utilisateur ?")) return;

await deleteDoc(doc(db,"users",id));

loadUsers();

}

window.logout=function(){

signOut(auth).then(()=>{
location.href="index.html";
});

}

document.getElementById("search").addEventListener("input",(e)=>{

const value=e.target.value.toLowerCase();

const filtered=users.filter(u=>
(u.email||"").toLowerCase().includes(value)
);

displayUsers(filtered);

});

</script>

</body>
</html>
