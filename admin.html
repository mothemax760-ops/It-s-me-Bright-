<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Admin — Bright Tup Up</title>

<style>
body {
  background: radial-gradient(circle at top left, #000 40%, #001a33 100%);
  color: #e0f7ff;
  font-family: "Poppins", sans-serif;
  text-align:center;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.profile-box {
  width:90%; max-width:420px;
  background:rgba(5,10,20,0.95);
  padding:25px;
  border-radius:12px;
  box-shadow:0 0 25px #00aaff, inset 0 0 15px #003355;
  border:1px solid #00aaff;
}

h2 { color:#00ccff; text-shadow:0 0 15px #00aaff; }

input {
  padding:10px;
  margin:6px;
  width:90%;
  border-radius:8px;
  border:1px solid #00ccff;
  background:#000;
  color:#e0f7ff;
}

button {
  padding:12px 20px;
  border:none; border-radius:10px;
  cursor:pointer; font-weight:bold;
  margin-top:10px;
  background:linear-gradient(90deg,#00aaff,#004466);
  color:#000;
  box-shadow:0 0 12px #00aaff;
  text-transform:uppercase;
}

button:hover {
  background:linear-gradient(90deg,#33bbff,#006699);
  box-shadow:0 0 20px #33bbff;
}

.red{
background:red;
color:white;
}
</style>

</head>
<body>

<div class="profile-box">

<h2>Admin Panel 🔝🧑‍💻</h2>

<input id="email" placeholder="Email utilisateur">
<input id="amount" type="number" placeholder="Montant">

<button onclick="addMoney()">Ajouter 💰</button>
<button onclick="removeMoney()">Retirer 💸</button>

<br><br>

<input id="newAdmin" placeholder="Email nouvel admin">
<button onclick="addAdmin()">Ajouter Admin</button>

<br><br>

<button onclick="countUsers()">Nombre de comptes</button>

<br>

<button onclick="location.href='cmd.html'">CMD</button>

<br>

<button class="red" onclick="logout()">Déconnexion</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
import { getFirestore, collection, getDocs, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCbQGaaTjyTxZTWNwRE5lTVkZsZbJyofgg",
  authDomain: "brighttupup.firebaseapp.com",
  projectId: "brighttupup",
  storageBucket: "brighttupup.appspot.com",
  messagingSenderId: "812394183947",
  appId: "1:812394183947:web:d65d60d6aeee39bcc3b60e"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const adminEmails = [
"christopherantoine773@gmail.com"
];

let currentUser = null;

onAuthStateChanged(auth, async(user)=>{

if(!user){
location.href="index.html";
return;
}

currentUser = user;

if(!adminEmails.includes(user.email.toLowerCase())){
alert("Accès refusé");
location.href="profil.html";
}

});

window.logout = function(){
signOut(auth).then(()=>{
location.href="index.html";
});
}

window.addMoney = async function(){

const email = document.getElementById("email").value.toLowerCase();
const amount = Number(document.getElementById("amount").value);

const users = await getDocs(collection(db,"users"));

users.forEach(async(d)=>{

const data = d.data();

if(data.email.toLowerCase() === email){

const ref = doc(db,"users",d.id);

await updateDoc(ref,{
credits:(Number(data.credits)||0)+amount
});

alert("Argent ajouté");

}

});

}

window.removeMoney = async function(){

const email = document.getElementById("email").value.toLowerCase();
const amount = Number(document.getElementById("amount").value);

const users = await getDocs(collection(db,"users"));

users.forEach(async(d)=>{

const data = d.data();

if(data.email.toLowerCase() === email){

const ref = doc(db,"users",d.id);

await updateDoc(ref,{
credits:Math.max(0,(Number(data.credits)||0)-amount)
});

alert("Argent retiré");

}

});

}

window.addAdmin = async function(){

const email = document.getElementById("newAdmin").value.toLowerCase();

const users = await getDocs(collection(db,"users"));

users.forEach(async(d)=>{

const data = d.data();

if(data.email.toLowerCase() === email){

const ref = doc(db,"users",d.id);

await updateDoc(ref,{
role:"admin"
});

alert("Admin ajouté");

}

});

}

window.countUsers = async function(){

const users = await getDocs(collection(db,"users"));

alert("Nombre de comptes : "+users.size);

}

</script>

</body>
</html>
