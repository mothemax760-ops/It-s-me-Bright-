<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Admin — Bright Tup Up</title>

<style>
body {
  background: radial-gradient(circle at top left, #000 40%, #001a33 100%);
  color:#e0f7ff;
  font-family:"Poppins",sans-serif;
  text-align:center;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.profile-box{
width:95%;
max-width:700px;
background:rgba(5,10,20,0.95);
padding:25px;
border-radius:12px;
box-shadow:0 0 25px #00aaff,inset 0 0 15px #003355;
border:1px solid #00aaff;
overflow:auto;
max-height:90vh;
}

h2{
color:#00ccff;
text-shadow:0 0 15px #00aaff;
}

.user{
border:1px solid #00aaff;
padding:10px;
margin:10px 0;
border-radius:8px;
}

button{
padding:8px 12px;
border:none;
border-radius:8px;
cursor:pointer;
margin:4px;
background:linear-gradient(90deg,#00aaff,#004466);
color:black;
font-weight:bold;
}

button:hover{
background:linear-gradient(90deg,#33bbff,#006699);
}

.red{
background:red;
color:white;
}

.green{
background:#00cc66;
color:black;
}
</style>
</head>

<body>

<div class="profile-box">

<h2>Admin Panel 🔝🧑‍💻</h2>

<div id="users-list"></div>

<br>

<button onclick="location.href='cmd.html'">📦 CMD</button>

<button onclick="location.href='dmb.html'">💳 DMB</button>

<br><br>

<button class="red" onclick="logout()">❌ Déconnexion</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getAuth,onAuthStateChanged,signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
import { getFirestore,collection,getDocs,doc,updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyCbQGaaTjyTxZTWNwRE5lTVkZsZbJyofgg",
authDomain:"brighttupup.firebaseapp.com",
projectId:"brighttupup",
storageBucket:"brighttupup.appspot.com",
messagingSenderId:"812394183947",
appId:"1:812394183947:web:d65d60d6aeee39bcc3b60e"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const adminEmails = ["christopherantoine773@gmail.com"];

onAuthStateChanged(auth,(user)=>{

if(!user){
location.href="index.html";
return;
}

if(!adminEmails.includes(user.email.toLowerCase())){
alert("Accès refusé");
location.href="profil.html";
return;
}

loadUsers();

});

window.logout=function(){
signOut(auth).then(()=>{
location.href="index.html";
});
}

async function loadUsers(){

const list=document.getElementById("users-list");

list.innerHTML="Chargement...";

const snap=await getDocs(collection(db,"users"));

list.innerHTML="";

snap.forEach(docSnap=>{

const data=docSnap.data();

const div=document.createElement("div");
div.className="user";

div.innerHTML=`
<b>${data.username || "Utilisateur"}</b><br>
${data.email}<br>
💰 ${data.credits || 0} crédits<br>
Rôle : ${data.role || "user"}<br>

<button onclick="addCredits('${docSnap.id}',${data.credits||0})">➕</button>
<button onclick="removeCredits('${docSnap.id}',${data.credits||0})">➖</button>
<button class="green" onclick="makeAdmin('${docSnap.id}')">👑 Admin</button>
`;

list.appendChild(div);

});

}

window.addCredits=async function(id,credits){

const amount=prompt("Combien ajouter ?");

if(!amount) return;

await updateDoc(doc(db,"users",id),{
credits:(Number(credits)||0)+Number(amount)
});

loadUsers();

}

window.removeCredits=async function(id,credits){

const amount=prompt("Combien retirer ?");

if(!amount) return;

await updateDoc(doc(db,"users",id),{
credits:Math.max(0,(Number(credits)||0)-Number(amount))
});

loadUsers();

}

window.makeAdmin=async function(id){

await updateDoc(doc(db,"users",id),{
role:"admin"
});

alert("Utilisateur devenu admin");

loadUsers();

}

</script>

</body>
</html>
