<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Admin — Bright Tup Up</title>
<style>
  body {
    background: radial-gradient(circle at top left, #000 40%, #001a33 100%);
    color: #e0f7ff;
    font-family: "Poppins", sans-serif;
    text-align:center;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding-top:50px;
  }
  .admin-box {
    width:90%; max-width:500px;
    background:rgba(5,10,20,0.95);
    padding:25px;
    border-radius:12px;
    box-shadow:0 0 25px #00aaff, inset 0 0 15px #003355;
    border:1px solid #00aaff;
  }
  h2 { color:#00ccff; margin:10px 0; text-shadow:0 0 15px #00aaff; }
  input, select {
    padding:10px; margin:8px 0;
    width:90%; max-width:400px;
    border-radius:8px; border:1px solid #00ccff;
    background:rgba(0,0,0,0.3); color:#e0f7ff;
  }
  button {
    padding:12px 20px;
    border:none; border-radius:10px;
    cursor:pointer; font-weight:bold;
    margin-top:10px;
    background:linear-gradient(90deg,#00aaff,#004466);
    color:#000;
    box-shadow:0 0 12px #00aaff;
    text-transform:uppercase;
    transition: all 0.3s ease;
  }
  button:hover {
    background:linear-gradient(90deg,#33bbff,#006699);
    box-shadow:0 0 20px #33bbff;
  }
</style>
</head>
<body>

<div class="admin-box">
  <h2>Admin Panel 🔝🧑‍💻</h2>
  
  <h3>💰 Envoyer de l'argent</h3>
  <input type="email" id="user-email" placeholder="Email de l'utilisateur"><br>
  <input type="number" id="amount" placeholder="Montant à ajouter"><br>
  <button id="send-money-btn">Envoyer 💸</button>

  <hr style="margin:20px 0; border-color:#00aaff;">

  <h3>🧑‍💻 Ajouter un Admin</h3>
  <input type="email" id="new-admin-email" placeholder="Email du nouvel admin"><br>
  <button id="add-admin-btn">Ajouter Admin</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, getDocs, doc, updateDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCbQGaaTjyTxZTWNwRE5lTVkZsZbJyofgg",
  authDomain: "brighttupup.firebaseapp.com",
  projectId: "brighttupup",
  storageBucket: "brighttupup.appspot.com",
  messagingSenderId: "812394183947",
  appId: "1:812394183947:web:d65d60d6aeee39bcc3b60e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

// Vérifier que l’utilisateur connecté est admin
onAuthStateChanged(auth, async (user) => {
  if(!user) return alert("Non connecté !");

  const email = user.email.toLowerCase();
  if(email !== "christopherantoine773@gmail.com"){
    alert("Accès admin refusé !");
    location.href = "profil.html";
  }
});

// Fonction pour envoyer de l'argent
document.getElementById("send-money-btn").addEventListener("click", async ()=>{
  const email = document.getElementById("user-email").value.toLowerCase();
  const amount = Number(document.getElementById("amount").value);
  if(!email || isNaN(amount) || amount <= 0){
    return alert("Veuillez remplir tous les champs correctement.");
  }

  try{
    const usersSnap = await getDocs(collection(db,"users"));
    let found = false;
    usersSnap.forEach(async docSnap=>{
      const data = docSnap.data();
      if(data.email.toLowerCase() === email){
        const userRef = doc(db,"users",docSnap.id);
        await updateDoc(userRef,{ credits: (Number(data.credits)||0) + amount });
        alert(`💰 ${amount} crédits ajoutés à ${email}`);
        found = true;
      }
    });
    if(!found) alert("Utilisateur non trouvé !");
  }catch(e){
    console.error(e);
    alert("Erreur lors de l'envoi d'argent.");
  }
});

// Fonction pour ajouter un admin
document.getElementById("add-admin-btn").addEventListener("click", async ()=>{
  const email = document.getElementById("new-admin-email").value.toLowerCase();
  if(!email) return alert("Entrez un email valide.");

  try{
    const usersSnap = await getDocs(collection(db,"users"));
    let found = false;
    usersSnap.forEach(async docSnap=>{
      const data = docSnap.data();
      if(data.email.toLowerCase() === email){
        const userRef = doc(db,"users",docSnap.id);
        await updateDoc(userRef,{ role: "admin" });
        alert(`🧑‍💻 ${email} est maintenant Administrateur`);
        found = true;
      }
    });
    if(!found) alert("Utilisateur non trouvé !");
  }catch(e){
    console.error(e);
    alert("Erreur lors de l'ajout de l'admin.");
  }
});
</script>

</body>
</html>
