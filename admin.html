<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Admin — Bright Tup Up</title>

<style>
body {
  background: radial-gradient(circle at top left, #000 40%, #001a33 100%);
  color:#e0f7ff;
  font-family:"Poppins",sans-serif;
  text-align:center;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.profile-box{
width:90%;
max-width:420px;
background:rgba(5,10,20,0.95);
padding:25px;
border-radius:12px;
box-shadow:0 0 25px #00aaff,inset 0 0 15px #003355;
border:1px solid #00aaff;
}

input{
padding:10px;
margin:6px;
width:90%;
border-radius:8px;
border:1px solid #00ccff;
background:black;
color:white;
}

button{
padding:12px 20px;
border:none;
border-radius:10px;
cursor:pointer;
margin-top:10px;
background:linear-gradient(90deg,#00aaff,#004466);
color:#000;
box-shadow:0 0 12px #00aaff;
}

button:hover{
background:linear-gradient(90deg,#33bbff,#006699);
}

.red{
background:red;
color:white;
}
</style>
</head>

<body>

<div class="profile-box">

<h2>Admin Panel 🔝🧑‍💻</h2>

<input id="email" placeholder="Email utilisateur">
<input id="amount" type="number" placeholder="Montant">

<br>

<button onclick="addMoney()">Ajouter 💰</button>
<button onclick="removeMoney()">Retirer 💸</button>

<br><br>

<input id="newAdmin" placeholder="Email nouvel admin">
<button onclick="addAdmin()">Ajouter Admin</button>

<br><br>

<button onclick="countUsers()">Nombre comptes</button>

<br>

<button onclick="location.href='cmd.html'">CMD</button>

<br>

<button onclick="location.href='dmb.html'">DMB</button>

<br><br>

<button class="red" onclick="logout()">Déconnexion</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getAuth,onAuthStateChanged,signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
import { getFirestore,collection,getDocs,doc,updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyCbQGaaTjyTxZTWNwRE5lTVkZsZbJyofgg",
authDomain:"brighttupup.firebaseapp.com",
projectId:"brighttupup",
storageBucket:"brighttupup.appspot.com",
messagingSenderId:"812394183947",
appId:"1:812394183947:web:d65d60d6aeee39bcc3b60e"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// Vérification admin (email + rôle Firestore)
const adminEmails = ["christopherantoine773@gmail.com"];

onAuthStateChanged(auth, async (user)=>{

if(!user){
location.href="index.html";
return;
}

let role="user";

try{

const users=await getDocs(collection(db,"users"));

users.forEach(d=>{
const data=d.data();

if(data.email && data.email.toLowerCase()===user.email.toLowerCase()){
role=data.role ?? "user";
}

});

}catch(e){
console.warn(e);
}

if(!adminEmails.includes(user.email.toLowerCase()) && role!=="admin"){
alert("Accès refusé");
location.href="profil.html";
}

});

// logout
window.logout=function(){
signOut(auth).then(()=>{
location.href="index.html";
});
}

// ajouter argent
window.addMoney=async function(){

const email=document.getElementById("email").value.toLowerCase();
const amount=Number(document.getElementById("amount").value);

const users=await getDocs(collection(db,"users"));

for(const d of users.docs){

const data=d.data();

if(data.email && data.email.toLowerCase()===email){

await updateDoc(doc(db,"users",d.id),{
credits:(Number(data.credits)||0)+amount
});

alert("Argent ajouté");
return;

}

}

alert("Utilisateur introuvable");

}

// retirer argent
window.removeMoney=async function(){

const email=document.getElementById("email").value.toLowerCase();
const amount=Number(document.getElementById("amount").value);

const users=await getDocs(collection(db,"users"));

for(const d of users.docs){

const data=d.data();

if(data.email && data.email.toLowerCase()===email){

await updateDoc(doc(db,"users",d.id),{
credits:Math.max(0,(Number(data.credits)||0)-amount)
});

alert("Argent retiré");
return;

}

}

alert("Utilisateur introuvable");

}

// ajouter admin
window.addAdmin=async function(){

const email=document.getElementById("newAdmin").value.toLowerCase();

const users=await getDocs(collection(db,"users"));

for(const d of users.docs){

const data=d.data();

if(data.email && data.email.toLowerCase()===email){

await updateDoc(doc(db,"users",d.id),{
role:"admin"
});

alert("Admin ajouté");
return;

}

}

alert("Utilisateur introuvable");

}

// compter comptes
window.countUsers=async function(){

const users=await getDocs(collection(db,"users"));

alert("Nombre comptes : "+users.size);

}

</script>

</body>
</html>
