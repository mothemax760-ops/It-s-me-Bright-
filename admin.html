<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bright Admin</title>

<style>
body{
font-family:Poppins,sans-serif;
background:radial-gradient(circle,#001a33,#000);
color:#e0f7ff;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.panel{
background:#020b18;
padding:30px;
border-radius:15px;
box-shadow:0 0 25px #00ccff;
text-align:center;
width:350px;
}

h2{
color:#00ccff;
}

input{
width:90%;
padding:10px;
margin:8px;
border-radius:8px;
border:none;
outline:none;
}

button{
padding:10px 18px;
margin:6px;
border:none;
border-radius:8px;
cursor:pointer;
background:#00ccff;
color:#000;
font-weight:bold;
}

button:hover{
background:#00e1ff;
}

</style>
</head>

<body>

<div class="panel">

<h2>Admin Panel 🔝🧑‍💻</h2>

<input id="email" placeholder="email utilisateur">

<input id="amount" type="number" placeholder="montant">

<br>

<button id="addMoney">Ajouter argent</button>

<button id="removeMoney">Retirer argent</button>

<br><br>

<button id="countUsers">Nombre de comptes</button>

<br><br>

<button onclick="window.location='cmd.html'">Voir Commandes</button>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import { getFirestore, doc, updateDoc, getDocs, collection, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";


const firebaseConfig = {
apiKey: "AIzaSyCbQGaaTjyTxZTWNwRE5lTVkZsZbJyofgg",
authDomain: "brighttupup.firebaseapp.com",
projectId: "brighttupup",
storageBucket: "brighttupup.appspot.com",
messagingSenderId: "812394183947",
appId: "1:812394183947:web:d65d60d6aeee39bcc3b60e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);



/* verification admin */

onAuthStateChanged(auth, async(user)=>{

if(!user){

alert("connecte toi");

location="login.html";

return;

}

const ref = doc(db,"users",user.uid);

const snap = await getDoc(ref);

if(!snap.exists() || snap.data().admin !== true){

alert("Accès refusé");

location="profil.html";

}

});


/* ajouter argent */

addMoney.onclick = async()=>{

const email = document.getElementById("email").value;
const amount = Number(document.getElementById("amount").value);

const users = await getDocs(collection(db,"users"));

users.forEach(async(u)=>{

if(u.data().email === email){

const current = u.data().money || 0;

await updateDoc(doc(db,"users",u.id),{

money: current + amount

});

alert("argent ajouté");

}

});

};



/* retirer argent */

removeMoney.onclick = async()=>{

const email = document.getElementById("email").value;
const amount = Number(document.getElementById("amount").value);

const users = await getDocs(collection(db,"users"));

users.forEach(async(u)=>{

if(u.data().email === email){

const current = u.data().money || 0;

await updateDoc(doc(db,"users",u.id),{

money: current - amount

});

alert("argent retiré");

}

});

};



/* nombre comptes */

countUsers.onclick = async()=>{

const users = await getDocs(collection(db,"users"));

alert("Nombre comptes : " + users.size);

};

</script>

</body>
</html>
