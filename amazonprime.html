<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bright Top Up | Amazon Prime</title>

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background:radial-gradient(circle at top,#001a33,#000);
color:#e0f7ff;
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
background:rgba(5,10,20,0.95);
border-bottom:2px solid #00aaff;
box-shadow:0 0 10px #00aaff;
}

.logo{
font-size:20px;
font-weight:bold;
color:#00ccff;
}

.balance{
padding:6px 12px;
border-radius:8px;
background:rgba(0,170,255,0.1);
color:#00ccff;
font-weight:bold;
border:1px solid #00aaff;
}

.cart-btn{
cursor:pointer;
font-weight:bold;
color:#00ccff;
}

/* CONTAINER */

.container{
padding:20px;
display:grid;
gap:15px;
}

/* PRODUCT */

.product{
background:rgba(5,10,20,0.95);
border:1px solid #00aaff33;
border-radius:14px;
padding:18px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 0 12px #00aaff22;
}

.product:hover{
box-shadow:0 0 18px #00aaff;
}

.product-info{
font-size:16px;
}

.price{
color:#00ffcc;
font-weight:bold;
font-size:18px;
}

.warning{
font-size:12px;
color:#ffcc00;
margin-top:6px;
}

/* BUTTON */

.buy-btn{
background:linear-gradient(90deg,#00aaff,#004466);
border:none;
padding:10px 16px;
border-radius:8px;
color:#000;
cursor:pointer;
font-weight:bold;
}

.buy-btn:hover{
box-shadow:0 0 12px #00aaff;
}

/* POPUP */

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.75);
display:none;
justify-content:center;
align-items:center;
}

.popup-box{
background:rgba(5,10,20,0.95);
padding:20px;
border-radius:12px;
width:320px;
border:2px solid #00aaff;
box-shadow:0 0 20px #00aaff;
}

.popup-box h3{
margin-top:0;
color:#00ccff;
text-align:center;
}

.popup-box input{
width:100%;
margin-bottom:10px;
padding:10px;
border-radius:8px;
border:1px solid #00aaff;
background:#000;
color:#fff;
}

.popup-box button{
width:100%;
padding:10px;
border:none;
border-radius:8px;
background:linear-gradient(90deg,#00aaff,#004466);
color:#000;
cursor:pointer;
font-weight:bold;
}

.cancel{
background:red !important;
color:#fff !important;
margin-top:6px;
}

</style>
</head>

<body>

<div class="header">

<div class="cart-btn" onclick="gotoCart()">
🛒(<span id="cartCount">0</span>)
</div>

<div class="logo">
BRIGHT PRIME
</div>

<div class="balance" id="balanceBox">
0 G
</div>

</div>

<div class="container">

<div class="product">

<div class="product-info">
Amazon Prime<br>
<span class="price">1 Mois + 1 Profil — 500 HTG</span>

<div class="warning">
Livraison automatique entre 5 min et 24h
</div>

</div>

<button class="buy-btn" onclick="openPopup('Amazon Prime 1 Mois',500)">
Acheter
</button>

</div>


<div class="product">

<div class="product-info">
Amazon Prime<br>
<span class="price">3 Mois + 1 Profil — 1354 HTG</span>

<div class="warning">
Livraison automatique entre 5 min et 24h
</div>

</div>

<button class="buy-btn" onclick="openPopup('Amazon Prime 3 Mois',1354)">
Acheter
</button>

</div>


<div class="product">

<div class="product-info">
Amazon Prime<br>
<span class="price">6 Mois + 1 Profil — 2707 HTG</span>

<div class="warning">
Livraison automatique entre 5 min et 24h
</div>

</div>

<button class="buy-btn" onclick="openPopup('Amazon Prime 6 Mois',2707)">
Acheter
</button>

</div>

</div>


<!-- POPUP -->

<div class="popup" id="popup">

<div class="popup-box">

<h3>Achat Amazon Prime</h3>

<input type="text" id="email" placeholder="Email Amazon">

<input type="text" id="whatsapp" placeholder="WhatsApp">

<button onclick="confirmBuy()">
Ajouter au panier
</button>

<button class="cancel" onclick="closePopup()">
Annuler
</button>

</div>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

/* FIREBASE */

const firebaseConfig={
apiKey:"AIzaSyCbQGaaTjyTxZTWNwRE5lTVkZsZbJyofgg",
authDomain:"brighttupup.firebaseapp.com",
projectId:"brighttupup",
storageBucket:"brighttupup.appspot.com",
messagingSenderId:"812394183947",
appId:"1:812394183947:web:d65d60d6aeee39bcc3b60e"
};

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);

let user={};

/* CONNEXION */

onAuthStateChanged(auth,async(firebaseUser)=>{

if(!firebaseUser){
location.href="index.html";
return;
}

let account={
email:firebaseUser.email,
username:firebaseUser.displayName||"Utilisateur",
photo:firebaseUser.photoURL||"",
balance:0,
role:"user"
};

try{

const snap=await getDocs(collection(db,"users"));

snap.forEach(doc=>{

const data=doc.data();

if(data.email?.toLowerCase()==firebaseUser.email.toLowerCase()){

account.username=data.username??account.username;
account.balance=Number(data.credits??0);
account.role=data.role??"user";

}

});

}catch(e){
console.warn(e);
}

sessionStorage.setItem("dpstore_user",JSON.stringify(account));

user=account;

updateBalance();

updateCartCount();

});

/* BALANCE */

function updateBalance(){
document.getElementById("balanceBox").innerText=user.balance+" G";
}

/* PANIER UTILISATEUR */

function normalizeId(str){

return (str||"guest")
.toLowerCase()
.replace(/[^a-z0-9@.-]/g,"_")
.replace(/@/g,"_at_");

}

function getCartKey(){
return "cart_"+normalizeId(user.email);
}

function loadCart(){
return JSON.parse(localStorage.getItem(getCartKey())||"[]");
}

function saveCart(cart){
localStorage.setItem(getCartKey(),JSON.stringify(cart));
}

function updateCartCount(){
document.getElementById("cartCount").innerText=
loadCart().length;
}

/* POPUP */

let selectedProduct=null;

function openPopup(name,price){

selectedProduct={name,price};

document.getElementById("popup").style.display="flex";

}

function closePopup(){
document.getElementById("popup").style.display="none";
}

/* AJOUT PANIER */

function confirmBuy(){

let email=document.getElementById("email").value.trim();

let whatsapp=document.getElementById("whatsapp").value.trim();

if(!email || !whatsapp){

alert("Remplissez tous les champs");

return;

}

let cart=loadCart();

cart.push({

name:selectedProduct.name,
price:selectedProduct.price,

buyer:user.email,
username:user.username,
email:user.email,

date:new Date().toLocaleString(),
status:"En attente",

meta:{
amazonEmail:email,
whatsapp:whatsapp
}

});

saveCart(cart);

updateCartCount();

closePopup();

alert("Produit ajouté au panier 🛒");

}

/* GO CART */

function gotoCart(){
window.location.href="cart.html";
}

</script>

</body>
</html>
