<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bright Top Up | Amazon Prime</title>

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background:radial-gradient(circle at top,#001a33,#000);
color:#e0f7ff;
}

/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
background:rgba(5,10,20,0.95);
border-bottom:2px solid #00aaff;
box-shadow:0 0 10px #00aaff;
position:sticky;
top:0;
z-index:10;
}

.logo{
font-weight:bold;
color:#00ccff;
font-size:1.3rem;
letter-spacing:2px;
}

.right-box{
display:flex;
align-items:center;
gap:12px;
}

.balance{
padding:6px 12px;
border-radius:8px;
background:rgba(0,170,255,0.1);
border:1px solid #00aaff;
font-weight:bold;
color:#00ccff;
}

.cart-btn{
cursor:pointer;
font-weight:bold;
}

.back-btn{
background:none;
border:2px solid #00aaff;
padding:6px 12px;
border-radius:8px;
cursor:pointer;
color:#00ccff;
font-weight:bold;
}

/* CONTAINER */

.container{
padding:20px;
display:grid;
gap:15px;
}

/* PRODUCT CARD */

.product{
background:rgba(5,10,20,0.95);
border-radius:12px;
border:1px solid #00aaff33;
padding:18px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 0 12px #00aaff22;
}

.product:hover{
box-shadow:0 0 18px #00aaff;
}

.product-info{
display:flex;
flex-direction:column;
gap:5px;
}

.title{
font-weight:bold;
font-size:1.1rem;
}

.price{
color:#00ccff;
font-weight:bold;
font-size:1.05rem;
}

.warning{
font-size:12px;
color:#ffcc00;
}

.buy-btn{
padding:10px 14px;
background:linear-gradient(90deg,#00aaff,#004466);
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
color:#000;
}

.buy-btn:hover{
box-shadow:0 0 12px #00aaff;
}

/* POPUP */

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.75);
display:none;
justify-content:center;
align-items:center;
}

.popup-box{
background:rgba(5,10,20,0.95);
border:2px solid #00aaff;
padding:25px;
border-radius:12px;
width:320px;
box-shadow:0 0 20px #00aaff;
display:flex;
flex-direction:column;
gap:10px;
}

.popup-box input{
padding:10px;
border-radius:8px;
border:1px solid #00aaff;
background:#000;
color:#fff;
}

.popup-box button{
padding:10px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.confirm-btn{
background:linear-gradient(90deg,#00aaff,#004466);
color:#000;
}

.cancel-btn{
background:red;
color:#fff;
}

</style>
</head>

<body>

<header>

<button class="back-btn" onclick="location.href='produits.html'">
← Retour
</button>

<div class="logo">
BRIGHT PRIME
</div>

<div class="right-box">

<div class="balance" id="balanceBox">
0 G
</div>

<div class="cart-btn" onclick="gotoCart()">
🛒(<span id="cartCount">0</span>)
</div>

</div>

</header>

<div class="container">

<div class="product">
<div class="product-info">
<div class="title">Amazon Prime</div>
<div class="price">1 Mois + 1 Profil — 500 HTG</div>
<div class="warning">Livraison entre 5 min et 24h</div>
</div>
<button class="buy-btn" onclick="openPopup('Amazon Prime 1 Mois',500)">
Acheter
</button>
</div>

<div class="product">
<div class="product-info">
<div class="title">Amazon Prime</div>
<div class="price">3 Mois + 1 Profil — 1354 HTG</div>
<div class="warning">Livraison entre 5 min et 24h</div>
</div>
<button class="buy-btn" onclick="openPopup('Amazon Prime 3 Mois',1354)">
Acheter
</button>
</div>

<div class="product">
<div class="product-info">
<div class="title">Amazon Prime</div>
<div class="price">6 Mois + 1 Profil — 2707 HTG</div>
<div class="warning">Livraison entre 5 min et 24h</div>
</div>
<button class="buy-btn" onclick="openPopup('Amazon Prime 6 Mois',2707)">
Acheter
</button>
</div>

</div>

<!-- POPUP -->

<div class="popup" id="popup">

<div class="popup-box">

<h3 id="popupTitle">Amazon Prime</h3>

<input id="emailAmazon" placeholder="Email Amazon">
<input id="whatsapp" placeholder="WhatsApp">

<button class="confirm-btn" onclick="confirmBuy()">
Ajouter au panier
</button>

<button class="cancel-btn" onclick="closePopup()">
Annuler
</button>

</div>

</div>

<script>

/* USER */

function safeParse(str){
try{return JSON.parse(str);}
catch(e){return null;}
}

let user=safeParse(sessionStorage.getItem("dpstore_user"))||{};

if(!user.email || !user.username){
alert("⚠ Connectez-vous !");
location.href="index.html";
}

/* PANIER STANDARD */

function normalizeId(str){
return (str||"guest")
.toLowerCase()
.replace(/[^a-z0-9@.-]/g,"_")
.replace(/@/g,"_at_");
}

function getCartKey(){
return "cart_"+normalizeId(user.email);
}

function loadCart(){
return JSON.parse(localStorage.getItem(getCartKey())||"[]");
}

function saveCart(cart){
localStorage.setItem(getCartKey(),JSON.stringify(cart));
}

function updateCartCount(){
document.getElementById("cartCount").textContent=loadCart().length;
}

function gotoCart(){
window.location.href="cart.html";
}

/* BALANCE */

function updateBalanceUI(){
document.getElementById("balanceBox").textContent=(user.balance??0)+" G";
}

updateBalanceUI();
updateCartCount();

/* POPUP */

let selectedProduct=null;

function openPopup(name,price){
selectedProduct={name,price};
document.getElementById("popupTitle").textContent=name+" - "+price+" HTG";
document.getElementById("popup").style.display="flex";
}

function closePopup(){
document.getElementById("popup").style.display="none";
}

/* CONFIRM BUY */

function confirmBuy(){

let emailAmazon=document.getElementById("emailAmazon").value.trim();
let whatsapp=document.getElementById("whatsapp").value.trim();

if(!emailAmazon || !whatsapp){
alert("Remplissez tous les champs");
return;
}

let cart=loadCart();

cart.push({

name:selectedProduct.name,
price:selectedProduct.price,

buyer:user.email,
username:user.username,
email:user.email,

date:new Date().toLocaleString(),
status:"En attente",

meta:{
amazonEmail:emailAmazon,
whatsapp:whatsapp
}

});

saveCart(cart);

updateCartCount();

closePopup();

alert("Produit ajouté au panier 🛒");

}

</script>

</body>
</html>
